name: "Sonoff SPM Bridge"
description: "Bridge Sonoff SPM power meters to Home Assistant via MQTT"
version: "1.0.2"
slug: "sonoff_spm_bridge"
url: "https://github.com/xinuc/sonoff-spm-bridge"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
# host_network is required so the SPM (on the physical LAN) can push webhook
# data back to us. In HA's default bridged network the add-on only has an
# internal Docker IP (172.30.x.x) which the SPM cannot route to.
host_network: true
ports:
  "8080/tcp": 8080
ports_description:
  "8080/tcp": "Webhook receiver for SPM data push"
options:
  spm_host: ""
  webhook_port: 8080
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  poll_interval: 60
  log_level: "info"
schema:
  spm_host: str
  webhook_port: "port"
  mqtt_host: str
  mqtt_port: "port"
  mqtt_username: "str?"
  mqtt_password: "password?"
  poll_interval: "int(10,300)"
  log_level: "list(debug|info|warning|error)"
